<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top-bar">
    <div>ALPHA</div>
    <nav>
        <a href="solicitacao.html">Solicitação de Compra</a>
        <a href="acompanhamento.html">Acompanhamento</a>
    </nav>
</header>

<main class="container">

    <div class="card">

        <!-- DADOS -->
        <div class="linha">
            <div>
                <label>Projeto</label>
                <input type="number" id="projeto">
            </div>

            <div>
                <label>Aplicação</label>
                <input type="text" id="local">
            </div>

            <div>
                <label>Data Necessidade</label>
                <input type="date" id="dataNecessidade">
            </div>

            <div>
                <label>Urgência</label>
                <select id="urgencia">
                    <option value=""></option>
                    <option value="baixa">Baixa</option>
                    <option value="media">Média</option>
                    <option value="alta">Alta</option>
                </select>
            </div>
        </div>

        <!-- TABELA -->
        <table>
            <thead>
                <tr>
                    <th>Nº</th>
                    <th>Cód. Produto</th>
                    <th>Descrição Produto</th>
                    <th>Un</th>
                    <th>Qtd</th>
                    <th>Obs</th>
                    <th></th>
                </tr>
            </thead>

            <tbody id="tabelaItens">

                <!-- LINHA INPUT -->
                <tr class="linha-input">
                    <td></td>

                    <td>
                        <input type="text" id="codigo" oninput="buscarPorCodigo()">
                    </td>

                    <td>
                        <input type="text" id="produto" oninput="filtrarProdutos()">
                        <div id="listaProdutos" class="lista-produtos"></div>
                    </td>

                    <td><input type="text" id="unidade"></td>

                    <td><input type="number" id="quantidade"></td>

                    <td><input type="text" id="obs"></td>

                    <td>
                        <button onclick="adicionarItem()">+</button>
                    </td>
                </tr>

            </tbody>
        </table>

        <br>

        <button onclick="enviarSolicitacao()">Enviar Solicitação</button>

    </div>

</main>

<script src="script.js"></script>
</body>
</html>
